---
layout: default
---

<section class="page-hero{% if page.page_class %} {{ page.page_class }}{% endif %}">
    <div class="eyebrow">{{ site.title }}</div>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p>{{ page.description }}</p>
    {% endif %}
</section>

<div class="page-content{% if page.page_class %} {{ page.page_class }}{% endif %}">
    {{ content }}
</div>
