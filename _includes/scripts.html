<script>
    // Global cart icon + drawer toggle
    const cartToggle = document.getElementById('cart-toggle');
    const cartBadge = document.getElementById('cart-badge');
    const cartDrawer = document.getElementById('cart-drawer');
    const drawerBackdrop = document.getElementById('drawer-backdrop');
    const drawerClose = cartDrawer ? cartDrawer.querySelector('.drawer-close') : null;

    function openCartDrawer() {
        if (!cartDrawer || !drawerBackdrop) return;
        cartDrawer.classList.add('open');
        drawerBackdrop.hidden = false;
        document.body.classList.add('menu-open');
    }

    function closeCartDrawer() {
        if (!cartDrawer || !drawerBackdrop) return;
        cartDrawer.classList.remove('open');
        drawerBackdrop.hidden = true;
        document.body.classList.remove('menu-open');
    }

    if (cartToggle) {
        cartToggle.addEventListener('click', function () {
            openCartDrawer();
        });
    }
    if (drawerClose) {
        drawerClose.addEventListener('click', closeCartDrawer);
    }
    if (drawerBackdrop) {
        drawerBackdrop.addEventListener('click', closeCartDrawer);
    }

    // Update cart badge and icon visibility from localStorage
    function updateCartBadge() {
        var count = parseInt(localStorage.getItem('ncev_cart_count') || '0', 10);
        if (cartBadge) {
            if (count > 0) {
                cartBadge.textContent = count;
                cartBadge.hidden = false;
            } else {
                cartBadge.hidden = true;
            }
        }
        if (cartToggle) {
            cartToggle.parentElement.style.display = count === 0 ? 'none' : '';
        }
    }
    updateCartBadge();

    // Global cart: fetch and render drawer on non-store pages
    var globalCartToken = '{{ site.fourthwall.token }}';
    var globalCheckoutDomain = '{{ site.fourthwall.checkout_domain }}';

    function globalFetchCart() {
        var cartId = localStorage.getItem('ncev_cart_id');
        if (!cartId) return;
        fetch('https://storefront-api.fourthwall.com/v1/carts/' + cartId + '?storefront_token=' + globalCartToken)
            .then(function (res) {
                if (!res.ok) throw new Error('Cart ' + res.status);
                return res.json();
            })
            .then(function (cart) {
                if (!cart || !cart.items || cart.items.length === 0) return;
                var drawerEmpty = document.getElementById('drawer-empty');
                var drawerFooter = document.getElementById('drawer-footer');
                var drawerItems = document.getElementById('drawer-items');
                var drawerSubtotal = document.getElementById('drawer-subtotal');
                if (!drawerItems) return;
                drawerItems.querySelectorAll('.cart-item').forEach(function (el) { el.remove(); });
                if (drawerEmpty) drawerEmpty.hidden = true;
                if (drawerFooter) drawerFooter.hidden = false;
                var subtotal = 0;
                cart.items.forEach(function (item) {
                    var v = item.variant;
                    var lineTotal = v.unitPrice.value * item.quantity;
                    subtotal += lineTotal;
                    var parts = [];
                    if (v.attributes.color) parts.push(v.attributes.color.name);
                    if (v.attributes.size) parts.push(v.attributes.size.name);
                    var el = document.createElement('div');
                    el.className = 'cart-item';
                    var img = document.createElement('img');
                    img.className = 'cart-item-img';
                    img.src = v.images && v.images[0] ? v.images[0].url : '';
                    img.alt = v.product.name;
                    el.appendChild(img);
                    var info = document.createElement('div');
                    info.className = 'cart-item-info';
                    var name = document.createElement('div');
                    name.className = 'cart-item-name';
                    name.textContent = v.product.name;
                    info.appendChild(name);
                    var variant = document.createElement('div');
                    variant.className = 'cart-item-variant';
                    variant.textContent = parts.join(' \u00B7 ') || 'Standard';
                    info.appendChild(variant);
                    var bottom = document.createElement('div');
                    bottom.className = 'cart-item-bottom';
                    var price = document.createElement('div');
                    price.className = 'cart-item-price';
                    price.textContent = '$' + lineTotal.toFixed(2);
                    bottom.appendChild(price);
                    var qty = document.createElement('div');
                    qty.className = 'cart-item-controls';
                    qty.textContent = 'Qty: ' + item.quantity;
                    bottom.appendChild(qty);
                    info.appendChild(bottom);
                    el.appendChild(info);
                    drawerItems.appendChild(el);
                });
                if (drawerSubtotal) drawerSubtotal.textContent = '$' + subtotal.toFixed(2);
            })
            .catch(function () {});
    }

    // Global checkout button handler
    var globalCheckoutBtn = document.getElementById('drawer-checkout');
    if (globalCheckoutBtn) {
        globalCheckoutBtn.addEventListener('click', function () {
            var cartId = localStorage.getItem('ncev_cart_id');
            if (!cartId) return;
            window.location.href = 'https://' + globalCheckoutDomain + '/checkout/?cartCurrency=USD&cartId=' + cartId;
        });
    }

    // Override openCartDrawer to fetch cart data globally
    var _baseOpenDrawer = openCartDrawer;
    openCartDrawer = function () {
        _baseOpenDrawer();
        globalFetchCart();
    };

    // Set current year
    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();

    // Navbar scroll effect
    const navbar = document.querySelector('nav');
    if (navbar) {
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    }

    // Mobile menu toggle
    const toggle = document.querySelector('.nav-toggle');
    const menu = document.querySelector('.nav-right');

    if (toggle && menu) {
        const closeMenu = ({ returnFocus = false } = {}) => {
            menu.classList.remove('active');
            toggle.setAttribute('aria-expanded', 'false');
            document.body.classList.remove('menu-open');
            if (returnFocus) toggle.focus();
        };

        const openMenu = () => {
            menu.classList.add('active');
            toggle.setAttribute('aria-expanded', 'true');
            document.body.classList.add('menu-open');
        };

        toggle.addEventListener('click', () => {
            const isOpen = menu.classList.contains('active');
            if (isOpen) {
                closeMenu();
            } else {
                openMenu();
            }
        });

        menu.addEventListener('click', (e) => {
            if (e.target.closest('a')) closeMenu();
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && !toggle.contains(e.target)) {
                closeMenu();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (menu.classList.contains('active')) closeMenu({ returnFocus: true });
                closeCartDrawer();
            }
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) closeMenu();
        });
    }

    // Scroll reveal
    const revealElements = document.querySelectorAll('.reveal');
    if (revealElements.length > 0) {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.15 });

        revealElements.forEach(el => observer.observe(el));
    }

    // Events embed fallback if the external widget does not populate
    const heyloFeed = document.getElementById('heylo-event-feed');
    const heyloStatus = document.getElementById('heylo-event-status');
    const heyloFallback = document.getElementById('heylo-event-fallback');

    if (heyloFeed && heyloStatus && heyloFallback) {
        const feedHasContent = () => heyloFeed.children.length > 0 || heyloFeed.textContent.trim().length > 0;

        const hideFallback = () => {
            heyloStatus.hidden = true;
            heyloFallback.hidden = true;
        };

        const showFallback = () => {
            if (!feedHasContent()) {
                heyloStatus.hidden = true;
                heyloFallback.hidden = false;
            }
        };

        const observer = new MutationObserver(() => {
            if (feedHasContent()) {
                hideFallback();
                observer.disconnect();
            }
        });

        observer.observe(heyloFeed, { childList: true, subtree: true, characterData: true });
        if (feedHasContent()) {
            hideFallback();
            observer.disconnect();
        } else {
            window.setTimeout(showFallback, 3500);
        }
    }
</script>
