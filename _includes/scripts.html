<script>
    // Global cart icon + drawer toggle
    const cartToggle = document.getElementById('cart-toggle');
    const cartBadge = document.getElementById('cart-badge');
    const cartDrawer = document.getElementById('cart-drawer');
    const drawerBackdrop = document.getElementById('drawer-backdrop');
    const drawerClose = cartDrawer ? cartDrawer.querySelector('.drawer-close') : null;

    function openCartDrawer() {
        if (!cartDrawer || !drawerBackdrop) return;
        cartDrawer.classList.add('open');
        drawerBackdrop.hidden = false;
        document.body.classList.add('menu-open');
    }

    function closeCartDrawer() {
        if (!cartDrawer || !drawerBackdrop) return;
        cartDrawer.classList.remove('open');
        drawerBackdrop.hidden = true;
        document.body.classList.remove('menu-open');
    }

    if (cartToggle) {
        cartToggle.addEventListener('click', function () {
            openCartDrawer();
        });
    }
    if (drawerClose) {
        drawerClose.addEventListener('click', closeCartDrawer);
    }
    if (drawerBackdrop) {
        drawerBackdrop.addEventListener('click', closeCartDrawer);
    }

    // Update cart badge and icon visibility from localStorage
    function updateCartBadge() {
        var count = parseInt(localStorage.getItem('ncev_cart_count') || '0', 10);
        if (cartBadge) {
            if (count > 0) {
                cartBadge.textContent = count;
                cartBadge.hidden = false;
            } else {
                cartBadge.hidden = true;
            }
        }
        if (cartToggle) {
            cartToggle.parentElement.style.display = count === 0 ? 'none' : '';
        }
    }
    updateCartBadge();

    // Strip HTML tags and decode entities from API strings
    function stripHtml(str) {
        if (!str) return '';
        return str
            .replace(/<[^>]*>/g, ' ')
            .replace(/&#(\d+);/g, function (m, code) { return String.fromCharCode(code); })
            .replace(/&#x([0-9a-fA-F]+);/g, function (m, code) { return String.fromCharCode(parseInt(code, 16)); })
            .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
            .replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&nbsp;/g, ' ')
            .replace(/\s+/g, ' ').trim();
    }

    // Global cart API and drawer rendering
    var globalCartToken = '{{ site.fourthwall.token }}';
    var globalCheckoutDomain = '{{ site.fourthwall.checkout_domain }}';
    var globalApiBase = 'https://storefront-api.fourthwall.com/v1';

    function globalCartApi(path, options) {
        options = options || {};
        var sep = path.indexOf('?') !== -1 ? '&' : '?';
        var url = globalApiBase + path + sep + 'storefront_token=' + globalCartToken;
        return fetch(url, options).then(function (res) {
            if (!res.ok) throw new Error('API ' + res.status);
            return res.json();
        });
    }

    function globalRenderDrawer(cart) {
        var drawerEmpty = document.getElementById('drawer-empty');
        var drawerFooter = document.getElementById('drawer-footer');
        var drawerItemsEl = document.getElementById('drawer-items');
        var drawerSubtotal = document.getElementById('drawer-subtotal');
        if (!drawerItemsEl) return;

        drawerItemsEl.querySelectorAll('.cart-item').forEach(function (el) { el.remove(); });

        if (!cart || !cart.items || cart.items.length === 0) {
            if (drawerEmpty) drawerEmpty.hidden = false;
            if (drawerFooter) drawerFooter.hidden = true;
            // Update badge to 0
            localStorage.setItem('ncev_cart_count', '0');
            updateCartBadge();
            return;
        }

        if (drawerEmpty) drawerEmpty.hidden = true;
        if (drawerFooter) drawerFooter.hidden = false;

        var subtotal = 0;
        var totalCount = 0;
        cart.items.forEach(function (item) {
            var v = item.variant;
            var lineTotal = v.unitPrice.value * item.quantity;
            subtotal += lineTotal;
            totalCount += item.quantity;
            var parts = [];
            if (v.attributes.color) parts.push(v.attributes.color.name);
            if (v.attributes.size) parts.push(v.attributes.size.name);

            var el = document.createElement('div');
            el.className = 'cart-item';

            var img = document.createElement('img');
            img.className = 'cart-item-img';
            img.src = v.images && v.images[0] ? v.images[0].url : '';
            img.alt = stripHtml(v.product.name);
            el.appendChild(img);

            var info = document.createElement('div');
            info.className = 'cart-item-info';

            var nameEl = document.createElement('div');
            nameEl.className = 'cart-item-name';
            nameEl.textContent = stripHtml(v.product.name);
            info.appendChild(nameEl);

            var varEl = document.createElement('div');
            varEl.className = 'cart-item-variant';
            varEl.textContent = stripHtml(parts.join(' \u00B7 ') || 'Standard');
            info.appendChild(varEl);

            var bottom = document.createElement('div');
            bottom.className = 'cart-item-bottom';

            var priceEl = document.createElement('div');
            priceEl.className = 'cart-item-price';
            priceEl.textContent = '$' + lineTotal.toFixed(2);
            bottom.appendChild(priceEl);

            var controls = document.createElement('div');
            controls.className = 'cart-item-controls';

            var qtyWrap = document.createElement('div');
            qtyWrap.className = 'cart-item-qty';

            var minusBtn = document.createElement('button');
            minusBtn.className = 'cart-qty-btn';
            minusBtn.setAttribute('aria-label', 'Decrease');
            minusBtn.textContent = '\u2212';
            minusBtn.dataset.action = 'minus';
            minusBtn.dataset.variant = v.id;
            qtyWrap.appendChild(minusBtn);

            var qtyVal = document.createElement('span');
            qtyVal.className = 'cart-qty-val';
            qtyVal.textContent = item.quantity;
            qtyWrap.appendChild(qtyVal);

            var plusBtn = document.createElement('button');
            plusBtn.className = 'cart-qty-btn';
            plusBtn.setAttribute('aria-label', 'Increase');
            plusBtn.textContent = '+';
            plusBtn.dataset.action = 'plus';
            plusBtn.dataset.variant = v.id;
            qtyWrap.appendChild(plusBtn);

            controls.appendChild(qtyWrap);

            var removeBtn = document.createElement('button');
            removeBtn.className = 'cart-item-remove';
            removeBtn.textContent = 'Remove';
            removeBtn.dataset.variant = v.id;
            controls.appendChild(removeBtn);

            bottom.appendChild(controls);
            info.appendChild(bottom);
            el.appendChild(info);
            drawerItemsEl.appendChild(el);
        });

        if (drawerSubtotal) drawerSubtotal.textContent = '$' + subtotal.toFixed(2);
        localStorage.setItem('ncev_cart_count', String(totalCount));
        updateCartBadge();
    }

    function globalFetchCart() {
        var cartId = localStorage.getItem('ncev_cart_id');
        if (!cartId) return;
        globalCartApi('/carts/' + cartId)
            .then(function (cart) { globalRenderDrawer(cart); })
            .catch(function () {});
    }

    // Drawer event delegation for quantity and remove
    var globalDrawerItems = document.getElementById('drawer-items');
    if (globalDrawerItems) {
        globalDrawerItems.addEventListener('click', function (e) {
            var qtyBtn = e.target.closest('.cart-qty-btn');
            var rmBtn = e.target.closest('.cart-item-remove');
            var cartId = localStorage.getItem('ncev_cart_id');
            if (!cartId) return;

            if (qtyBtn) {
                var vid = qtyBtn.dataset.variant;
                var qtyEl = qtyBtn.parentElement.querySelector('.cart-qty-val');
                var curQty = parseInt(qtyEl.textContent, 10);
                if (qtyBtn.dataset.action === 'minus') {
                    if (curQty <= 1) return;
                    curQty--;
                } else {
                    if (curQty >= 10) return;
                    curQty++;
                }
                globalCartApi('/carts/' + cartId + '/change', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: [{ variantId: vid, quantity: curQty }] }),
                }).then(function (cart) { globalRenderDrawer(cart); }).catch(function () {});
            }

            if (rmBtn) {
                globalCartApi('/carts/' + cartId + '/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: [{ variantId: rmBtn.dataset.variant, quantity: 1 }] }),
                }).then(function (cart) { globalRenderDrawer(cart); }).catch(function () {});
            }
        });
    }

    // Global checkout button handler
    var globalCheckoutBtn = document.getElementById('drawer-checkout');
    if (globalCheckoutBtn) {
        globalCheckoutBtn.addEventListener('click', function () {
            var cartId = localStorage.getItem('ncev_cart_id');
            if (!cartId) return;
            window.location.href = 'https://' + globalCheckoutDomain + '/checkout/?cartCurrency=USD&cartId=' + cartId;
        });
    }

    // Override openCartDrawer to fetch cart data globally
    var _baseOpenDrawer = openCartDrawer;
    openCartDrawer = function () {
        _baseOpenDrawer();
        globalFetchCart();
    };

    // Set current year
    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();

    // Navbar scroll effect
    const navbar = document.querySelector('nav');
    if (navbar) {
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    }

    // Mobile menu toggle
    const toggle = document.querySelector('.nav-toggle');
    const menu = document.querySelector('.nav-right');

    if (toggle && menu) {
        const closeMenu = ({ returnFocus = false } = {}) => {
            menu.classList.remove('active');
            toggle.setAttribute('aria-expanded', 'false');
            document.body.classList.remove('menu-open');
            if (returnFocus) toggle.focus();
        };

        const openMenu = () => {
            menu.classList.add('active');
            toggle.setAttribute('aria-expanded', 'true');
            document.body.classList.add('menu-open');
        };

        toggle.addEventListener('click', () => {
            const isOpen = menu.classList.contains('active');
            if (isOpen) {
                closeMenu();
            } else {
                openMenu();
            }
        });

        menu.addEventListener('click', (e) => {
            if (e.target.closest('a')) closeMenu();
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && !toggle.contains(e.target)) {
                closeMenu();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (menu.classList.contains('active')) closeMenu({ returnFocus: true });
                closeCartDrawer();
            }
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) closeMenu();
        });
    }

    // Scroll reveal
    const revealElements = document.querySelectorAll('.reveal');
    if (revealElements.length > 0) {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.15 });

        revealElements.forEach(el => observer.observe(el));
    }

    // Events embed fallback if the external widget does not populate
    const heyloFeed = document.getElementById('heylo-event-feed');
    const heyloStatus = document.getElementById('heylo-event-status');
    const heyloFallback = document.getElementById('heylo-event-fallback');

    if (heyloFeed && heyloStatus && heyloFallback) {
        const feedHasContent = () => heyloFeed.children.length > 0 || heyloFeed.textContent.trim().length > 0;

        const hideFallback = () => {
            heyloStatus.hidden = true;
            heyloFallback.hidden = true;
        };

        const showFallback = () => {
            if (!feedHasContent()) {
                heyloStatus.hidden = true;
                heyloFallback.hidden = false;
            }
        };

        const observer = new MutationObserver(() => {
            if (feedHasContent()) {
                hideFallback();
                observer.disconnect();
            }
        });

        observer.observe(heyloFeed, { childList: true, subtree: true, characterData: true });
        if (feedHasContent()) {
            hideFallback();
            observer.disconnect();
        } else {
            window.setTimeout(showFallback, 3500);
        }
    }
</script>
